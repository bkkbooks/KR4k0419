body:
  text: 鄧粲晉紀中宗元皇帝遷左將軍從討成都王穎敗穎將陸機穎殺機及雲初機雲入洛造張華如舊相識張華多鬚常以綿纏之陸雲見之笑不能止御覽三百七十四蕩陰之敗也叔父東安王繇為穎所害帝奔歸國王導與元帝有布衣之好知中國將亂勸帝渡江世說注二東海王越留帝以東平監徐州鎮下邳與范陽王虓發兵虓以劉琨為司馬琨與兄璵俱知名遊權貴之閒當世以為豪傑世說注八越西迎大駕留帝居守奉駕東還以越為太傅録尚書越以重名辟士以胡毋輔之為從事中郎胡毋輔之過河南尹門下將飲酒河南卒王子博倨坐其傍輔之叱之使取火子博曰我卒也惟不乏吾事則已安能復為人使輔之因就與語嘆曰吾不及也因言之于河南尹以為功曹書鈔七十七御覽四百九十八事類賦注火以謝鯤為掾鯤與王澄之徒慕竹林諸人散首披髮裸袒箕踞謂之八達故鄰家有美女鯤挑之女織梭投之折其兩齒世為謠曰任達不已幼輿折齒世說注五御覽三百八十竹林諸人阮籍母將死與人圍棊如故對者求止籍不肯留與決睹既而飲酒三升舉聲一號嘔血數升廢頓久之世說注七御覽七百四十三又七百五十三阮籍能為青白眼禮俗之士輒以白眼對之宗正嵇喜康之兄也聞籍喪趨弔焉籍以不器見白眼喜不懌而退御覽三百六十六又五百六十一嵇康曾鍛于長林之下鍾會造焉康坐坐以鹿皮嶷然正容不與之酬對會恨而去御覽八百三十三劉伶嘗著袒服而乘鹿車縱酒放蕩或脫衣裸形在屋中客有詣伶值其裸袒責伶伶笑曰吾以天地為宅舍以屋宇為㡓衣諸君自不當入我㡓中又何惡乎其自任若是世說注七書鈔一百四十八御覽四百九十八帝遷安東將軍都督揚州用王導計始鎮建鄴求王導為安東司馬政皆決之號仲父晉中興之万導實居其首世說注二越以王澄為荊州澄放蕩不拘時謂之達世說注七王澄為荊州縱酒嬉戲荊州民宗廞以酒色禮澄王平子怒厲色叱左右捽廞上亦略見書鈔七十三別駕郭舒厲色謂左右曰使君醉汝輩何敢妄動平子大恚曰別駕狂邪枉言我醉因遣灸舒眉頭舒跪受灸平子意釋而廞得免御覽二百六十三又三百六十五越引裴遐為主簿越子毗害之遐以辨論為業善敘名理辭氣清暢泠然若琴瑟聞其言者知與不知無不歎服世說注三裴遐性恬和同類有試遐者推墮床下遐乃拂衣還坐毫無慍色書鈔一百三十三御覽三百九十三杜韜據長沙反前始興太守尹虞起兵于巴陵自號監軍以討杜韜連戰稍勝遂進長沙為韜所沒初韜略虞二女皆國色也將妻之女不肯曰我父二千石終不為賊作婦有死而已及虞攻賊賊殺之御覽三百八十又四百三十九虞初為始興太守滇陽令羊嗣貪而不治縣功曹吏共逐嗣嗣饒鬚乃以嗣內羊闌中始興太守尹虞聞大怒手劍功曹御覽三百七十四帝加鎮東大將軍以王湛為從事中郎王湛字處沖太原人有隱德人莫之知雖兄弟宗族亦以為癡唯父昶異焉昶喪居墓次不交當世兄小濟往省湛見床頭有周易謂湛曰叔父用此何為頗曾看不湛笑曰體中佳時脫復看耳今日當與汝言因共談易剖析入微妙言奇趣濟所未聞嘆不能測濟性好馬而所乘馬駿駛意甚愛之湛曰此馬雖小駛然力薄不堪苦近見督郵馬當勝此但養不至耳濟然之取督郵馬榖食十數日與湛試之湛未常乘馬卒然便騎馳騁步驟不異于濟而馬不相勝湛曰今直行平路何以別馬勝不唯當就蟻封耳于是就蟻封盤馬濟馬果倒踣濟乃服其俊識天才乃爾御覽八百九十五世說注四受越命討周馥馥字祖宣汝南人代劉淮為鎮東將軍鎮壽陽移檄四方欲奉迎天子元皇使甘卓攻之馥出奔道卒世說注四王澄屢為杜韜所敗召為軍咨祭酒以周顗代之時敦方討韜屯豫章澄過之猶以舊侮敦敦誣殺之劉琨常謂澄曰卿形雖散朗而內徑俠以此處世難得其死澄默然無以答後果為王敦所害劉琨聞之曰自取死耳世說注八澄內史王機率門客千餘入廣州州將溫邵等叛刺史郭訥迎王機訥以州授之太子洗馬郭訥字敬言嘗入洛觀伎人歌言佳石崇問其曲訥不知崇笑卿不識曲那得言佳訥答譬如見西施何必識其姓名然後知美崇無以難御覽五百七十事類賦注歌廣平太守崔諒表政穀長鄭希子休妻石氏年十餘歲為邦邑所宗既歸鄭氏為九族所重休前妻女少孤又休父希臨終庶子沈生是時漢末大亂希命棄之曰奈何使舅愛子至不存活乎寧割肌膚之恩以存顧援之命養沈及前女力不兼舉九年之中三不舉子御覽四百三十九此段不知所附姑録于此建興元年以陶侃為荊州以周顗為軍咨祭酒顗為荊州始至而建平民傅密等叛迎蜀賊顗狼狽失據陶侃救之得免顗至武昌投王敦敦更選侃代顗顗還建康未得即用也世說注五建興三年轉陶侃廣州刺史初有譖侃于王敦者乃以從弟廙代侃為荊州左遷侃廣州侃文武距廙而求侃敦聞大怒及侃將蒞廣州過敦敦陳兵欲害侃敦咨議參軍梅陶諫敦乃止厚禮而遣之世說注四建興四年漢劉曜陷北地進至涇陽諸城悉潰梁緯等死之散騎常侍梁緯妻辛氏隴西人也劉曜欲妻之使人扶取因據地哭從者亦哭曜並殺之御覽四百三十九建武元年宋哲奔建康稱受愍帝詔令丞相睿統攝萬機官屬上尊號不許固請乃即晉王位時江寧民虞迪墾地得白玉麟璽一鈕以獻文曰長壽萬年御覽六百八十二以周顗為吏部尚書伯仁儀容宏偉善于俯仰應答精神足以蔭映數人深自持能致人而未嘗往焉世說注二太興元年奉愍帝凶問百官請上尊號遂即皇帝位立王太子紹為皇太子拜周顗為太子少傅伯仁清正嶷然以德望稱之世說注五劉琨為段匹磾所害琨為并州牧糾合齊盟驅率戎旅而內不撫其民遂至喪軍失士無成功也世說注八荀組渡江鄧攸亦至江東永嘉中攸為石勒所獲召見立幕下與語悅之坐而飯焉攸車所止與胡人鄰轂胡人失火燒車營勒吏案問胡胡誣攸攸度不可與爭乃曰向為老姥作粥失火延逸罪應萬死勒知遣之所誣胡厚德攸遺其驢馬護送令得逸世說注一周訪斬杜曾敦常謂訪若擒曾當表為荊州朝廷亦以訪代王廙敦忌訪威名難之郭舒說敦自領之敦素重舒從之後事王敦諫敦敦呵曰人以卿癡灸卿眉舊疾復發也舒曰汲黯朱雲癡乎白帖華談為祕書自負宿名意每怏怏嘗從容謂上曰臣老于祕閣矣汲黯之言復存今日上不悅御覽二百三十三太興三年十二月詔曰晉室開基方鎮之任親賢並用其以譙王丞為湘州刺史長沙鄧騫聞之歎曰湘州禍其在斯乎太興四年戴淵出為征西周顗代為護軍紀詹置酒王導與周顗及朝士詣尚書紀瞻觀伎瞻有愛妾能為新聲顗于衆中欲通其妾露其醜穢顏無怍色有司奏免顗官詔特原之世說注七永昌元年正月王敦舉兵反初王導協贊中興敦有方面之功敦以劉隗為閒己舉兵討之故含敦兄南奔武昌朝廷始警備也世說注二誰王丞傳檄列敦罪惡遣主簿鄧騫說甘卓曰劉大連雖乘權寵驕蹇失衆心非有害于天下也大將軍以其私憾稱兵象魏雖託討亂之名實失天下之望此忠臣義十竭節匡救之時也昔魯連匹夫猶懷蹈海之志況受任方伯位同體國者乎今若奉辭伐罪因天人之心唱桓文之舉杖大順以掃逆節擁義兵以勤王室斯千載之運不可失也卓笑曰桓文之事豈吾所能至于盡力國難乃其心也當共詳思之參軍李梁說卓曰昔隗囂亂隴右竇融保河西以歸光武今日之事有似于此將軍有重名于天下但當推亡固存坐而待之使大將軍勝方當崇將軍以方面之重如其不勝朝廷必以將軍代之何憂不富貴而釋此廟勝決存亡于一戰邪騫謂梁曰光武當創業之初中國未平故隗囂斷隴右竇融兼河西各據一方鼎足之勢故得文服天子從容顧望及海內已定君臣正位終于隴右傾覆河西入朝何則向之文服義所不容也今將軍之于本朝非竇融之喻也襄陽之于大府非河西之固也且人臣之義安忍國難而不陳力何以北面于天子邪使大將軍平劉隗還武昌增石城之守絶荊湘之粟將軍欲安歸乎勢在人手而曰我處廟勝未之聞也卓尚持疑未決騫又謂卓曰今既不義舉又不承大將軍檄此必至之禍愚智所見也且為大臣國家有難坐視而不救于義安乎議者之所難以彼彊我弱是不量虛實者也今大將軍兵不過萬餘其留者不能五千而將軍見衆既倍之矣將軍威名天下所聞也北府精鋭戰勝之兵也擁彊衆藉威名杖節而行豈王含所能禦哉遡流之衆勢不自救將軍之以順討逆舉武昌若摧枯拉朽何所顧慮乎武昌既定據其軍實鎮撫二州施惠士卒使還者如歸此呂蒙所以克關羽也如是大將軍可不戰而自潰今釋必勝之策安坐以待危亡不可言知計矣願將軍熟慮之時敦以卓不至慮在後為變遣參軍樂道融苦要卓俱下道融本欲背敦忿其悖逆反說卓曰王敦背恩肆逆舉兵向闕君受國厚恩而與之同生為逆臣死為愚鬼不亦惜乎為君之計莫若僞許應命而馳襲武昌必不戰而自潰矣卓既素不欲從敦得道融說遂決曰吾本意也乃與巴東監軍柳純南平太守夏侯承宜都太守談該等十餘人俱露檄遠近陳敦肆逆率所統致討遣參軍司馬讚孫雙奉表詣臺參軍羅英至廣州與陶侃剋期參軍鄧騫虞沖至長沙令譙王丞堅守征西將軍戴若思在江西先得卓書表上之臺內皆稱萬歲侃遣參軍高寶帥兵北下武昌大驚傳卓軍至人皆奔散敦分兵寇長沙舂陵令長沙楊雄距王敦馳檄遠近列敦罪惡城陷為魏父所虜送詣敦敦以檄示雄雄曰有之但雄力弱不能扶翼本州匡救國難以此慚恨爾書鈔百單三舂陵長楊雄起兵討王敦敦欲活之使還邑舍洗沐衆人皆賀雄曰吾夢乘車挂肉其傍肉必有筋筋者斤吾其死也敦果刑雄御覽三百九十五敦據石頭初王敦將下朝士共議周顗以為敦剛愎不仁親殺害平子必能稱兵以向朝廷敦既克石頭顗與戴淵共詣敦謂顗曰伯丘卿負我顗答曰公戎車內侮下官親帥六軍不能其事使王旅敗績以此負公又問淵吾此舉動天下為何如答曰見形者謂之逆體識者以為忠敦笑曰若思卿能言御覽四百二十八敦殺戴淵周顗王敦籍周顗家笥簏中有故絮故播酒五甕米數斛在位者服其清御覽四百二十五時王敦參軍有于敦坐樗蒱臨當成都馬頭被殺因謂曰周家奕世令望而位不至三公伯仁垂作而不果有似下官此馬敦慨然流涕曰伯仁總角時與豫東宮相遇一面披襟便許之三司何圖不幸王法所裁悽愴之深言何能盡世說注八敦改易百官將還謝鯤請敦朝天子不從鯤見太子問曰論者以君方庾亮鯤有勝情遠概為朝廷之望故時以庾亮方焉世說注五敦兵陷長沙譙王丞死之魏又以虞悝兄弟為丞黨盡誅之而以鄧騫為別駕鄧騫字長真長沙人少有志氣為鄉鄰所重常推誠行己能以正直全于多難之時刺史譙王丞命為主簿使說甘卓卓留為參軍欲與同行以母老辭卓而反丞為魏乂所敗以虞悝兄弟為丞黨乂盡誅之而求騫甚急鄉人皆為之懼騫笑曰欲用我耳彼新得州多殺忠良是其求賢之時豈以行人為罪乃往詣乂乂喜曰君所謂古之解楊也以為別駕騫有節操忠信兼識量弘遠善與人交久而益敬太尉庾亮稱之以為長者歷武陵始興太守遷大司農卒于官五月敦殺甘卓王敦欲伐甘卓遣使送大刀布御覽六百八十七閏十一月帝崩上身服儉約以先時務性素好酒將渡江王導深以為諫帝乃令左右進觴飲而覆之自是遂不復飲克己復禮官修其方而中興之業隆焉世說注五肅祖明皇帝太寧二年王敦殺周嵩嵩字仲智謨兄也性狡直果狹每以才氣陵人物顗被害王敦使人弔焉嵩曰亡兄天下有義人為天下無義所殺復何所弔敦甚銜之猶取為從事中郎因事誅嵩世說注三溫嶠還都言敦逆謀敦怒欲拔其舌乃殺郭璞郭璞為王敦參軍知敦作亂受假還都露布以討溫嶠為名及至建康南坑殺參軍郭璞初桓彝常令璞筮卦卦成彝問其故璞曰卦與吾同初學記二十敦使王含錢鳳等帥衆向京師敦將至溫嶠燒朱雀橋以阻其兵世說注六敦聞含敗憤惋而死敦性簡脫口不言財其好尚如此世說注六太寧三年贈甘卓戴淵等官而不及周顗弟謨復重表乃贈官周謨字叔治顗次弟也仕室中護軍世說注三以王彪之為尚書郎王彪之字叔武年二十鬢鬚皓白時人謂之王白鬚御覽三百七十四庾翼薦桓溫于明帝曰陛下勿以常壻畜之桓溫少與沛國劉惔善惔常稱之曰溫眼如紫石稜鬚似蝟毛磔孫仲謀晉宣王之流御覽三百七十四溫弟沖亦知名常與劉驎之遊劉驎之字子驥南陽安衆人少尚質素虛退寡欲好遊山澤閒志存遁逸桓沖常至其家驎之方條桑謂沖曰使君既枉駕光臨宜先詣家君沖遂詣其父父命驎之然後乃還拂短褐與沖言父使驎之自持濁酒葅菜供賓沖敕人代之父辭曰若使官人則非野人之意也沖為慨然至昏乃退因請為長史固辭居岐陽去道斥近人士往來必投其家驎之自供給贈致無所受去家百里有孤嫗疾將死謂人曰惟有劉長史當埋我耳驎之身往候之值終為治棺殯其仁愛皆如此以壽卒世說注六閏七月帝崩太子即位進璽王導以疾不至卞壼正色于朝曰王公非社稷之臣導輿疾而至初咸和中貴遊子弟能談嘲者慕王平子謝幼輿等為達壼厲色于朝曰悖禮傷教罪莫斯甚中朝傾覆實由于此欲奏治之王導庾亮不從乃止其後皆折節為名士世說注五時後趙始立試經之制石勒手不能書目不識字每于軍中令人誦讀聽之皆解其意世說注四徙封琅邪王昱為會稽王拜散騎常侍謝萬字萬石簡文辟為從事中郎著白綸巾鶴氅裘版而前帝與談移日御覽六百八十七王恭誅童謠曰昔年食麥屑今年食䝁豆䝁豆不可食使我枯嚨喉御覽八百五十三
